<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42c920" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#42c920" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7dff50"/>
      <stop offset="60%" stop-color="#42c920"/>
      <stop offset="100%" stop-color="#1a6b08"/>
    </radialGradient>
    <radialGradient id="domeGrad" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ccffcc"/>
      <stop offset="50%" stop-color="#42c920" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d3d04" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow aura -->
  <ellipse cx="32" cy="38" rx="28" ry="10" fill="url(#glow)"/>

  <!-- Luzes inferiores (raio trator) -->
  <ellipse cx="22" cy="43" rx="3" ry="2" fill="#42c920" opacity="0.7"/>
  <ellipse cx="32" cy="45" rx="3" ry="2" fill="#7dff50" opacity="0.8"/>
  <ellipse cx="42" cy="43" rx="3" ry="2" fill="#42c920" opacity="0.7"/>

  <!-- Corpo principal do disco -->
  <ellipse cx="32" cy="38" rx="26" ry="9" fill="url(#bodyGrad)" filter="url(#glowFilter)"/>

  <!-- Borda inferior do disco -->
  <ellipse cx="32" cy="40" rx="26" ry="4" fill="#1a6b08" opacity="0.6"/>

  <!-- Faixa central brilhante -->
  <ellipse cx="32" cy="37" rx="18" ry="3.5" fill="#42c920" opacity="0.5"/>

  <!-- Cúpula -->
  <ellipse cx="32" cy="32" rx="13" ry="9" fill="url(#domeGrad)" filter="url(#glowFilter)"/>

  <!-- Reflexo da cúpula -->
  <ellipse cx="27" cy="27" rx="5" ry="3" fill="white" opacity="0.25" transform="rotate(-20 27 27)"/>

  <!-- Janelas / luzes piscando -->
  <circle cx="18" cy="38" r="2.2" fill="#ccffcc" opacity="0.9"/>
  <circle cx="26" cy="40" r="2.2" fill="#7dff50" opacity="0.9"/>
  <circle cx="34" cy="41" r="2.2" fill="#ccffcc" opacity="0.9"/>
  <circle cx="42" cy="40" r="2.2" fill="#7dff50" opacity="0.9"/>
  <circle cx="50" cy="38" r="2.2" fill="#ccffcc" opacity="0.9"/>
</svg>
